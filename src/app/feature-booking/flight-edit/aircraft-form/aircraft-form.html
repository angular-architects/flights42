@let aircraftFrom = aircraft();

<fieldset>
  <legend>Aircraft</legend>

  <div class="form-group">
    <label for="type">Type:</label>
    <input id="type" class="form-control" [field]="aircraftFrom.type" />
    <app-validation-errors-pane [errors]="aircraftFrom.type().errors()" />
  </div>
  <div class="form-group">
    <label for="registration">Registration:</label>
    <input
      id="registration"
      class="form-control"
      [field]="aircraftFrom.registration"
    />
    <app-validation-errors-pane
      [errors]="aircraftFrom.registration().errors()"
    />
  </div>
</fieldset>
