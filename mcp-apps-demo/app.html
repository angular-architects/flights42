<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCP Apps Demo App</title>
    <style>
      :root {
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      body {
        margin: 0;
        padding: 1rem;
        background: transparent;
      }

      .app-shell {
        border: 2px solid #2563eb;
        border-radius: 16px;
        padding: 1rem;
        background: white;
      }

      h1 {
        margin-top: 0;
      }

      p {
        color: #475569;
      }

      pre {
        padding: 1rem;
        border-radius: 12px;
        background: #0f172a;
        color: #e2e8f0;
        overflow: auto;
        margin: 0;
      }

      pre[hidden] {
        display: none;
      }

      [name='hotels'] {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-bottom: 1.25rem;
      }

      .hotel-card {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.875rem 1rem;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
        transition:
          border-color 0.15s ease,
          box-shadow 0.15s ease;
      }

      .hotel-card:hover {
        border-color: #93c5fd;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.12);
      }

      .hotel-icon {
        width: 2.5rem;
        height: 2.5rem;
        padding: 0.625rem;
        border-radius: 10px;
        background: #dbeafe;
        flex-shrink: 0;
        box-sizing: border-box;
        object-fit: contain;
      }

      .hotel-name {
        font-weight: 600;
        color: #0f172a;
      }

      [name='details'] {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .toggle-details-btn {
        align-self: flex-start;
        padding: 0.5rem 1rem;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: white;
        color: #334155;
        font: inherit;
        font-weight: 500;
        cursor: pointer;
        transition:
          background 0.15s ease,
          border-color 0.15s ease;
      }

      .toggle-details-btn:hover {
        background: #f8fafc;
        border-color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <h1>App</h1>
      <p>
        The app connects back to the host and renders the received tool result.
      </p>

      <div id="app"></div>
    </div>

    <script type="module" src="./app.ts"></script>
  </body>
</html>
