<article class="msg assistant">
  <div class="avatar">🤖</div>
  <div>
    <div class="bubble">
      <app-message data="Hi! How can I help you?"></app-message>
    </div>
    <div class="meta"></div>
  </div>
</article>

@for (message of messageModels(); track message.id) {
  <article
    class="msg"
    [class.assistant]="message.role === 'assistant'"
    [class.user]="message.role === 'user'"
    [class.error]="message.role === 'error'">
    <div class="avatar">{{ message.icon }}</div>
    <div>
      <div class="bubble">
        @if (message.contentString) {
          <!-- TODO: display the contentString using the app-message component -->
        }

        @for (widget of message.widgets; track widget.id) {
          <!-- TODO: display the widget using the app-widget-container component -->
        }

        @for (toolCall of message.toolCalls; track toolCall.id) {
          <div class="tool-call" [title]="toolCall.args | json">
            <!-- TODO: display the tool name -->
            <app-tool-status
              class="ml-5"
              [pending]="toolCall.status === 'pending'" />
          </div>
        }
      </div>
      <div class="meta"></div>
    </div>
  </article>
}

@if (showIndicator()) {
  <article class="msg assistant">
    <div class="avatar">🤖</div>
    <div>
      <div class="bubble">
        <div class="ai-wait-indicator">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
  </article>
}
