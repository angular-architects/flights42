<h1>Luggage</h1>

<div class="row">
  @for (item of luggage(); track item.id) {
    <div class="col-xs-12 col-sm-6 col-md-4 col-lg-3">
      <app-luggage-card
        [item]="item"
        [selected]="selected()[item.id]"
        (selectedChange)="updateSelected(item.id, $event)">
        <p class="detail">Full Id: LUGGAGE-0815-4711-{{ item.id }}</p>

        <span class="button">
          <button>Add Insurance</button>
        </span>

        <div class="footer">Your luggage is in the best hands!</div>
      </app-luggage-card>
    </div>
  }
</div>
