<h1>Flight Edit</h1>

@if (flight().id !== 0) {
  <!-- 
    TODO: If flightForm is invalid, display its errorSummary 
      with the JSON pipe 
  -->

  <form>
    <!-- 
      TODO: For each field 
        - databind to flightForm via formField directive
        - display the errors object with the JSON pipe if unvalid
    -->

    <div>
      <label for="flight-id">ID</label>
      <input type="number" id="flight-id" />
    </div>

    <div>
      <label for="flight-from"> From </label>
      <input id="flight-from" />
    </div>

    <div>
      <label for="flight-to"> To </label>
      <input id="flight-to" />
    </div>

    <div>
      <label for="flight-date">Date</label>
      <div>
        <input class="form-control" id="flight-date" type="datetime-local" />
      </div>
    </div>

    <div class="form-check">
      <label class="form-check-label">
        <input type="checkbox" class="form-check-input" id="flight-delayed" />
        Delayed</label
      >
    </div>

    <div class="mt-40">
      <button [disabled]="isDisabled()" type="button" (click)="save()">
        Save
      </button>

      <!-- <button (click)="toggleStrict()" type="button" (click)="save()">
        Toggle Strict Mode
      </button> -->
    </div>
  </form>

  <a [routerLink]="['../../advanced-flight-edit', flight().id]">Show Details</a>
  »
}
