<h1>Flight Search</h1>

<form>
  <div class="form-group">
    <label for="from">From:</label>
    <input [formField]="filterForm.from" id="from" />
  </div>
  <div class="form-group">
    <label for="to">To:</label>
    <input [formField]="filterForm.to" id="to" />
  </div>

  <div class="form-group">Route: {{ flightRoute() }}</div>

  <div class="form-group">
    <button
      type="button"
      (click)="search()"
      [disabled]="!filter().from || !filter().to">
      Search
    </button>
    <button type="button" (click)="delay()" [disabled]="flights().length === 0">
      Delay 1st
    </button>
  </div>
</form>

@if (isLoading()) {
  <div>Loading...</div>
}

@if (error()) {
  <div class="alert">Error loading flights!</div>
}

<div class="row">
  @for (flight of flightsWithDelays(); track flight.id) {
    <div class="col-xs-12 col-sm-6 col-md-4 col-lg-3">
      <app-flight-card
        [item]="flight"
        [selected]="basket()[flight.id]"
        (selectedChange)="updateBasket(flight.id, $event)" />
      <a [routerLink]="['/booking/flight-edit', flight.id]">Edit</a>
    </div>
  }
</div>

<p>&nbsp;</p>

<pre>{{ basket() | json }}</pre>
