<h1>Passenger Search</h1>

<form>
  <div>
    <label for="name">Name:</label>
    <input [formField]="filterForm.name" id="name" />
  </div>
  <div>
    <label for="firstName">First Name:</label>
    <input [formField]="filterForm.firstName" id="firstName" />
  </div>
  <div>
    <button type="button" (click)="search()">Search</button>
  </div>
</form>

<div class="row">
  @for (p of passengers(); track p.id) {
    <div class="col-xs-12 col-sm-6 col-md-4 col-lg-3">
      <app-passenger-card
        [item]="p"
        [selected]="selected()[p.id]"
        (selectedChange)="updateSelected(p.id, $event)">
        <button [routerLink]="['../passenger-edit', p.id]">Edit</button>
      </app-passenger-card>
    </div>
  }
</div>

<p>&nbsp;</p>

<div>
  <pre>{{ selected() | json }}</pre>
</div>
