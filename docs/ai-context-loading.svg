    <rect x="95" y="525" width="210" height="40" rx="2" fill="#f5f5f5" stroke="#616161"/>
    <text x="200" y="550" text-anchor="middle" fill="#111">.cursor/rules/cursor.mdc</text>

    <rect x="560" y="525" width="260" height="40" rx="2" fill="#f5f5f5" stroke="#616161"/>
    <text x="690" y="550" text-anchor="middle" fill="#111">.cursor/rules/architecture.mdc</text>
  </g>

  <!-- ===================== EDGE LABELS ===================== -->
  <g font-size="11" font-style="italic" fill="#b25400" text-anchor="middle"
     style="paint-order:stroke; stroke:#ffffff; stroke-width:3px; stroke-linejoin:round;">
    <text x="585" y="110">&#171;on demand&#187;</text>
    <text x="600" y="262">&#171;on demand&#187;</text>
    <text x="788" y="262">&#171;on demand&#187;</text>
    <text x="585" y="615">&#171;on demand&#187;</text>
    <text x="592" y="460">&#171;on demand&#187;</text>
    <text x="792" y="460">&#171;on demand&#187;</text>
  </g>

  <!-- ===================== LEGEND ===================== -->
  <g>
    <rect x="20" y="15" width="265" height="124" rx="6" fill="#fafafa" stroke="#cccccc"/>
    <rect x="34" y="30" width="28" height="17" rx="8" fill="#1565c0" stroke="#0d47a1"/>
    <text x="72" y="43" font-size="12" fill="#222">Agent (abgerundete Ecken)</text>
    <rect x="34" y="58" width="28" height="17" rx="2" fill="#f5f5f5" stroke="#616161"/>
    <text x="72" y="71" font-size="12" fill="#222">File (eckig)</text>
    <line x1="34" y1="93" x2="62" y2="93" stroke="#555" stroke-width="1.8" marker-end="url(#arrow)"/>
    <text x="72" y="97" font-size="12" fill="#222">immer geladen</text>
    <line x1="34" y1="117" x2="62" y2="117" stroke="#b25400" stroke-width="1.8" stroke-dasharray="6,5" marker-end="url(#arrowDash)"/>
    <text x="72" y="121" font-size="12" fill="#222"><tspan font-style="italic" fill="#b25400">&#171;on demand&#187;</tspan> = nur bei Bedarf</text>
  </g>
