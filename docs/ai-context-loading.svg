<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="745" viewBox="0 0 1080 745" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="arrowDash" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#b25400"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1080" height="745" fill="#ffffff"/>

  <!-- ===================== EDGES (Agent -> File) ===================== -->
  <!-- Claude Code (oben) -> Files -->
  <line x1="420" y1="72" x2="212" y2="155" stroke="#555" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="500" y1="72" x2="663" y2="155" stroke="#b25400" stroke-width="1.8" stroke-dasharray="6,5" marker-end="url(#arrowDash)"/>
  <line x1="200" y1="195" x2="200" y2="343" stroke="#555" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="668" y1="195" x2="548" y2="343" stroke="#b25400" stroke-width="1.8" stroke-dasharray="6,5" marker-end="url(#arrowDash)"/>
  <line x1="722" y1="195" x2="838" y2="343" stroke="#b25400" stroke-width="1.8" stroke-dasharray="6,5" marker-end="url(#arrowDash)"/>

  <!-- Cursor AI (unten) -> Files -->
  <line x1="420" y1="653" x2="214" y2="567" stroke="#555" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="200" y1="525" x2="200" y2="382" stroke="#555" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="500" y1="653" x2="663" y2="567" stroke="#b25400" stroke-width="1.8" stroke-dasharray="6,5" marker-end="url(#arrowDash)"/>
  <line x1="650" y1="525" x2="548" y2="382" stroke="#b25400" stroke-width="1.8" stroke-dasharray="6,5" marker-end="url(#arrowDash)"/>
  <line x1="730" y1="525" x2="838" y2="382" stroke="#b25400" stroke-width="1.8" stroke-dasharray="6,5" marker-end="url(#arrowDash)"/>

  <!-- ===================== NODES ===================== -->
