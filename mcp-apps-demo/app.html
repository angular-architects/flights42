<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCP Apps Demo App</title>
    <style>
      :root {
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      body {
        margin: 0;
        padding: 1rem;
        background: transparent;
      }

      .app-shell {
        border: 2px solid #2563eb;
        border-radius: 16px;
        padding: 1rem;
        background: white;
      }

      h1 {
        margin-top: 0;
      }

      p {
        color: #475569;
      }

      pre {
        padding: 1rem;
        border-radius: 12px;
        background: #0f172a;
        color: #e2e8f0;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <h1>App</h1>
      <p>
        The app connects back to the host and renders the received tool result.
      </p>

      <div id="app"></div>
    </div>

    <script type="module" src="./app.ts"></script>
  </body>
</html>
