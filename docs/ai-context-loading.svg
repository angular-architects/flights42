    <rect x="140" y="155" width="120" height="40" rx="2" fill="#f5f5f5" stroke="#616161"/>
    <text x="200" y="180" text-anchor="middle" fill="#111">CLAUDE.md</text>

    <rect x="615" y="155" width="150" height="40" rx="2" fill="#f5f5f5" stroke="#616161"/>
    <text x="690" y="180" text-anchor="middle" fill="#111">src/CLAUDE.md</text>

    <rect x="140" y="340" width="120" height="40" rx="2" fill="#f5f5f5" stroke="#616161"/>
    <text x="200" y="365" text-anchor="middle" fill="#111">AGENTS.md</text>

    <rect x="385" y="340" width="270" height="40" rx="2" fill="#f5f5f5" stroke="#616161"/>
    <text x="520" y="365" text-anchor="middle" fill="#111">docs/architecture-boundaries.md</text>

    <rect x="720" y="340" width="300" height="40" rx="2" fill="#f5f5f5" stroke="#616161"/>
