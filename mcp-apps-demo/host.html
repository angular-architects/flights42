<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCP Apps Demo Host</title>
    <style>
      :root {
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        color: #111827;
        background: #f8fafc;
      }

      body {
        margin: 0;
        padding: 2rem;
      }

      main {
        max-width: 900px;
        margin: 0 auto;
      }

      h1 {
        margin-top: 0;
      }

      p {
        color: #475569;
      }

      #iframe-host {
        margin-top: 1.5rem;
      }

      iframe {
        width: 100%;
        min-height: 280px;
        border: 1px solid #cbd5e1;
        border-radius: 16px;
        background: white;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Host</h1>
      <p>
        This page creates an iframe, connects to the app through
        <code>@modelcontextprotocol/ext-apps</code>, and sends one tool result.
      </p>

      <div id="iframe-host"></div>
    </main>

    <script type="module" src="./host.ts"></script>
  </body>
</html>
