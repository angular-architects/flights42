@if (chat) {
  <button
    (click)="toggle()"
    id="ai-toggle"
    class="ai-toggle"
    aria-haspopup="dialog"
    aria-controls="ai-panel">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path
        d="M4 5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H9.83a2 2 0 0 0-1.41.59l-2.12 2.12A1 1 0 0 1 4 18.41V5Z"
        stroke="currentColor"
        stroke-width="1.5" />
    </svg>
    <span>Assistant</span>
  </button>

  <div id="ai-backdrop" class="ai-backdrop"></div>

  <aside
    id="ai-panel"
    [class.open]="panelVisible()"
    class="ai-panel"
    role="dialog"
    aria-modal="true"
    aria-labelledby="ai-title">
    <header class="ai-header">
      <div class="ai-title">
        <svg
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          aria-hidden="true">
          <path
            d="M12 2l2.39 4.84L20 7.27l-3.64 3.54.86 5.02L12 13.77 6.78 15.83l.86-5.02L4 7.27l5.61-.43L12 2Z"
            stroke="currentColor"
            stroke-width="1.4" />
        </svg>
        <div>
          <div id="ai-title">AI Assistant</div>
        </div>
      </div>
      <div class="ai-actions">
        <button
          (click)="toggle()"
          class="icon-btn"
          id="ai-close"
          title="Schließen"
          aria-label="Schließen">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path
              d="M6 6l12 12M18 6 6 18"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round" />
          </svg>
        </button>
      </div>
    </header>

    <section
      id="ai-messages"
      class="ai-messages"
      aria-live="polite"
      #messagesContainer>
      <app-chat-messages
        [messages]="chat.value()"
        [interrupt]="chat.interrupt()"
        (resumeInterrupt)="resumeInterrupt($event)"
        [pending]="chat.isLoading()" />
    </section>

    <form
      id="ai-composer"
      class="ai-composer"
      autocomplete="off"
      (ngSubmit)="submit()">
      <div class="composer-inner">
        <input
          #composerInput
          [(ngModel)]="message"
          class="composer-input"
          name="message"
          placeholder="Your Question ..." />
      </div>
    </form>
  </aside>
} @else {
  <div>Chat not available!</div>
}
