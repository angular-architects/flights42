  <g>
    <rect x="385" y="18" width="150" height="54" rx="14" fill="#1565c0" stroke="#0d47a1" stroke-width="2"/>
    <text x="460" y="50" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Claude Code</text>
  </g>
  <g>
    <rect x="385" y="653" width="150" height="54" rx="14" fill="#1565c0" stroke="#0d47a1" stroke-width="2"/>
    <text x="460" y="685" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Cursor AI</text>
  </g>

  <!-- Files (eckig) -->
