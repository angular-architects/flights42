<h1>Your Next Flights</h1>

<div class="row">
  @for (ticket of tickets(); track ticket.id) {
    <div class="col-xs-12 col-sm-6 col-md-4 col-lg-3">
      <app-flight-card
        [item]="ticket"
        [selected]="selected()[ticket.id]"
        (selectedChange)="updateSelected(ticket.id, $event)"
      >
        <button
          [routerLink]="['/checkin', { ticketId: ticket.id }]"
          [queryParams]="{ expertMode: true }"
          queryParamsHandling="merge"
          fragment="confirmation"
        >
          Check-in
        </button>
      </app-flight-card>
    </div>
  }
</div>
