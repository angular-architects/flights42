<h1>About</h1>

<hr />
<ng-container #vcRef></ng-container>
<hr />

<app-tabbed-pane #pane>
  <app-tab title="Upcoming Flights">
    <p>No upcoming flights!</p>
  </app-tab>

  <app-tab title="Operated Flights">
    <p>No operated flights!</p>
  </app-tab>

  <app-tab title="Cancelled Flights">
    <p>No cancelled flights!</p>
  </app-tab>
</app-tabbed-pane>

<p>&nbsp;</p>

<button (click)="pane.activate(1)">Activate 2nd tab</button>

&nbsp;

<button (appClickWithWarning)="deleteAll()" #cww="clickWithWarning">
  Delete All!
</button>

&nbsp;

<button (click)="showDialog()" class="btn btn-default">Show Dialog</button>

<!-- 
<app-dialog-outlet /> 
-->

<!-- 
<button (click)="cww.handleClick(true)">
  Delete without asking questions!
</button> 
-->

<p>&nbsp;</p>

<div>
  <button
    appSimpleTooltip="Click here to book the flight"
    class="btn btn-default">
    Book Flight
  </button>
</div>

<p>&nbsp;</p>

<div>
  <input
    [appTooltip]="tmpl"
    placeholder="Passenger Name"
    style="max-width: 200px" />
</div>

<ng-template #tmpl let-title let-body="text">
  <div class="tooltip">
    <h4>{{ title }}</h4>
    <p>
      {{ body }}
    </p>
  </div>
</ng-template>

<p>&nbsp;</p>

<app-data-table [data]="flights()">
  <div *appTableField="let data; provide: 'id'; title: 'Flight Id'">
    {{ data }}
  </div>
  <div *appTableField="let data; provide: 'from'; title: 'From'">
    {{ data }}
  </div>
  <div *appTableField="let data; provide: 'to'; title: 'To'">{{ data }}</div>
  <div *appTableField="let data; provide: 'date'; title: 'Departure Date'">
    {{ data | date: 'dd.MM.yyyy HH:mm' }}
  </div>
</app-data-table>

<p>&nbsp;</p>
