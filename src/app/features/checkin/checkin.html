<h1>Check-in</h1>

<form style="max-width: 400px">
  <div>
    <label for="flightId">Ticket Id</label>
    <input [(ngModel)]="ticketId" name="ticketId" />
  </div>

  <div>
    <label for="firstName">First Name</label>
    <input />
  </div>

  <div>
    <label for="lastName">Last Name</label>
    <input />
  </div>

  <div>
    <label for="email">Email Address</label>
    <input />
  </div>

  <div>
    <div class="checkbox">
      <label>
        <input type="checkbox" />
        I accept the general conditions of carriage
      </label>
    </div>
  </div>

  <div routerLink id="confirmation">
    <button (click)="checkin()" type="submit">Check-in</button>
    <button (click)="navigateToNextFlights()">Next Flights</button>
  </div>
</form>
